<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" th:href="@{/css/common.css}">
	<link rel="stylesheet" th:href="@{/css/equipment/overbueLayout.css}">
	<title>返却期限切れ一覧</title>
</head>

<body>
	<div th:replace="~{common/layout :: header}"></div>

	<div>
		<h2>返却期限切れ一覧</h2>

		<table border="1">
			<tr>
				<th>シリアル</th>
				<th>備品名</th>
				<th>カテゴリ</th>
				<th>所有区分</th>
				<th>返却期限</th>
				<th>使用者</th>
			</tr>

			<tr th:each="list : ${overList}">
				<td th:text="${list.stockCode}"></td>
				<td th:text="${list.productName}"></td>
				<td th:text="${list.categoryName}"></td>
				<td th:text="${list.ownershipType}"></td>
				<td th:text="${list.returnDate}"></td>
				<td th:text="${list.staffName}"></td>
			</tr>
		</table>
	</div>

	<form th:action="@{/topMenu}" method="get">
		<button type="submit">戻る</button>
	</form>

</body>

</html>
