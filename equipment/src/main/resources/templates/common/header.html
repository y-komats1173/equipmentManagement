<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">

<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" th:href="@{/css/common.css}">
</head>

<body>
	<header th:fragment="layout-header">
		<nav class="main-nav">

			<!-- 左側 -->
			<div class="nav-left">
				<a th:if="${session.user != null and session.user.authNo != 99}" th:href="@{/topMenu}" class="logo">
					備品管理システム
				</a>

				<a th:if="${session.user == null or session.user.authNo == 99}" th:href="@{/index}" class="logo">
					備品管理システム
				</a>
			</div>



			<!-- 右側 -->
			<!-- 履歴 -->
			<a th:if="${session.user != null}" th:href="@{/equipment/history}" class="nav-link small-link">
				貸出履歴
			</a>

			<div class="nav-right" th:if="${session.user != null}">
				<a th:href="@{/user/detail/{staffNo}(staffNo=${session.user.staffNo})}">
					<span th:text="${session.user.name}"></span>さん
					<a th:href="@{/user/logout}" class="nav-link">ログアウト</a>
			</div>

		</nav>
	</header>



</body>

</html>
